<!DOCTYPE html>
<html>
<head>
  <title>Setup - Timetable Master NG</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

  <h1>⚙️ School Setup</h1>

  <!-- SCHOOL DETAILS -->
  <div class="card">
    <h3>🏫 School Details</h3>

    <input type="text" id="schoolName" placeholder="School Name">

    <select id="schoolLevel">
      <option>Primary</option>
      <option>Secondary</option>
    </select>
  </div>

  <!-- TIME STRUCTURE -->
  <div class="card">
    <h3>⏰ Time Setup</h3>

    <label>Days</label>
    <select id="days">
      <option value="5">Monday - Friday</option>
      <option value="6">Monday - Saturday</option>
    </select>

    <label>Periods Per Day</label>
    <input type="number" id="periods" value="6">
  </div>

  <!-- SUBJECTS -->
  <div class="card">
    <h3>📚 Subjects</h3>

    <div id="subjectList"></div>

    <button onclick="addSubject()">+ Add Subject</button>
  </div>

  <!-- TEACHERS -->
  <div class="card">
    <h3>👨‍🏫 Teachers</h3>

    <div id="teacherList"></div>

    <button onclick="addTeacher()">+ Add Teacher</button>
  </div>

  <br>

  <button onclick="saveSetup()" class="primary">💾 Save & Continue</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/script.js"></script>

</body>
</html>
