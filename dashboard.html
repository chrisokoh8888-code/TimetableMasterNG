<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Timetable Master NG</title>
</head>
<body>

<h1>🏫 Timetable Dashboard</h1>

<p id="status"></p>

<hr>

<h2>📅 Generate New Timetable</h2>
<button onclick="generate()">Generate Timetable</button>

<hr>

<h2>📂 Saved Timetables</h2>
<div id="timetableList">Loading...</div>

<hr>

<button onclick="logout()">Logout</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let isPremium = false;
let generationCount = 0;

// CHECK USER
auth.onAuthStateChanged((user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {

    db.collection("users").doc(user.uid).get()
    .then(doc => {

      let data = doc.data();

      if (data.plan === "premium") {
        isPremium = true;
        status.innerText = "✅ Premium Active";
      } else {
        status.innerText = "⚠️ Demo Mode";
      }

      loadTimetables();

    });
  }
});


// GENERATE TIMETABLE
function generate() {
  if (!isPremium && generationCount >= 1) {
    alert("Demo limit reached. Upgrade to continue.");
    return;
  }

  generationCount++;

  let timetable = "Sample timetable " + new Date().toLocaleString();

  saveTimetable(timetable);
}


// SAVE TIMETABLE
function saveTimetable(data) {
  let user = auth.currentUser;

  db.collection("timetables").add({
    userId: user.uid,
    timetable: data,
    createdAt: new Date()
  }).then(() => {
    alert("Saved!");
    loadTimetables();
  });
}


// LOAD TIMETABLES
function loadTimetables() {
  let user = auth.currentUser;

  db.collection("timetables")
    .where("userId", "==", user.uid)
    .orderBy("createdAt", "desc")
    .get()
    .then(snapshot => {

      let html = "";

      snapshot.forEach(doc => {
        let data = doc.data();

        html += `
          <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <p><strong>Date:</strong> ${new Date(data.createdAt.seconds * 1000).toLocaleString()}</p>
            <button onclick="viewTimetable('${data.timetable}')">View</button>
            <button onclick="deleteTimetable('${doc.id}')">Delete</button>
          </div>
        `;
      });

      timetableList.innerHTML = html || "No timetables yet.";

    });
}


// VIEW
function viewTimetable(data) {
  alert(data); // later upgrade to modal
}


// DELETE
function deleteTimetable(id) {
  db.collection("timetables").doc(id).delete()
  .then(() => {
    alert("Deleted");
    loadTimetables();
  });
}


// LOGOUT
function logout() {
  auth.signOut();
}
</script>

</body>
</html>
