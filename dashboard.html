<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Timetable Master NG</title>
  <style>
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th {
  background: #0d47a1;
  color: white;
  padding: 10px;
}

td {
  padding: 10px;
  text-align: center;
}

tr:nth-child(even) {
  background: #f2f2f2;
}
  </style>
</head>
<body>

<h1>🏫 Timetable Dashboard</h1>

<p id="status"></p>

<hr>

<h2>📅 Generate New Timetable</h2>
<button onclick="generate()">Generate Timetable</button>

<hr>

<h2>📂 Saved Timetables</h2>
<div id="timetableList">Loading...</div>
<!-- TIMETABLE VIEWER -->
<div id="viewer" style="display:none; margin-top:20px;">
  <h2>📅 Timetable Preview</h2>

  <button onclick="closeViewer()">❌ Close</button>

  <div id="tableContainer"></div>
</div>
<hr>

<button onclick="logout()">Logout</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let isPremium = false;
let generationCount = 0;

// CHECK USER
auth.onAuthStateChanged((user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {

    db.collection("users").doc(user.uid).get()
    .then(doc => {

      let data = doc.data();

      if (data.plan === "premium") {
        isPremium = true;
        status.innerText = "✅ Premium Active";
      } else {
        status.innerText = "⚠️ Demo Mode";
      }

      loadTimetables();

    });
  }
});


// GENERATE TIMETABLE
function generate() {
  if (!isPremium && generationCount >= 1) {
    alert("Demo limit reached. Upgrade to continue.");
    return;
  }

  generationCount++;

  let timetable = "Sample timetable " + new Date().toLocaleString();

  saveTimetable(timetable);
}


// SAVE TIMETABLE
function saveTimetable(data) {
  let user = auth.currentUser;

  db.collection("timetables").add({
    userId: user.uid,
    timetable: data,
    createdAt: new Date()
  }).then(() => {
    alert("Saved!");
    loadTimetables();
  });
}


// LOAD TIMETABLES
function loadTimetables() {
  let user = auth.currentUser;

  db.collection("timetables")
    .where("userId", "==", user.uid)
    .orderBy("createdAt", "desc")
    .get()
    .then(snapshot => {

      let html = "";

      snapshot.forEach(doc => {
        let data = doc.data();

        html += `
          <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <p><strong>Date:</strong> ${new Date(data.createdAt.seconds * 1000).toLocaleString()}</p>
            <button onclick="viewTimetable('${data.timetable}')">View</button>
            <button onclick="deleteTimetable('${doc.id}')">Delete</button>
          </div>
        `;
      });

      timetableList.innerHTML = html || "No timetables yet.";

    });
}


// VIEW
function viewTimetable(data) {

  let timetable = JSON.parse(data);

  let days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
  let periods = ["P1", "P2", "P3", "P4", "P5", "P6"];

  let html = "<table border='1'>";

  // HEADER
  html += "<tr><th>Period</th>";
  days.forEach(day => {
    html += `<th>${day}</th>`;
  });
  html += "</tr>";

  // ROWS
  periods.forEach(period => {
    html += `<tr><td><b>${period}</b></td>`;

    days.forEach(day => {
      let subject = timetable[day]?.[period] || "";
      html += `<td>${subject}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("tableContainer").innerHTML = html;
  document.getElementById("viewer").style.display = "block";
}


// DELETE
function deleteTimetable(id) {
  db.collection("timetables").doc(id).delete()
  .then(() => {
    alert("Deleted");
    loadTimetables();
  });
}


// LOGOUT
function logout() {
  auth.signOut();
}
  function closeViewer() {
  document.getElementById("viewer").style.display = "none";
  }
</script>

</body>
</html>
